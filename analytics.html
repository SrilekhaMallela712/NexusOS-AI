<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusOS AI Analytics</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
}

.sidebar{
width:260px;
background:#111827;
height:100vh;
padding:25px;
position:fixed;
}

.logo{
font-size:28px;
font-weight:700;
color:#38bdf8;
margin-bottom:40px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
margin:18px 0;
}

.sidebar a{
color:white;
text-decoration:none;
}

.sidebar a:hover{
color:#38bdf8;
}

.main{
margin-left:260px;
padding:30px;
width:100%;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
}

.card h4{
margin-bottom:10px;
color:#94a3b8;
}

.value{
font-size:32px;
font-weight:700;
color:#38bdf8;
}

.chart-container{
background:#1e293b;
padding:25px;
border-radius:20px;
margin-bottom:25px;
}

.chart-title{
margin-bottom:20px;
font-size:20px;
}

canvas{
max-height:350px;
}

@media(max-width:900px){

.sidebar{
display:none;
}

.main{
margin-left:0;
}

}
</style>
</head>

<body>

<div class="sidebar">

<div class="logo">NexusOS AI</div>

<ul>
<li><a href="dashboard.html">🏠 Dashboard</a></li>
<li><a href="analytics.html">📊 Analytics</a></li>
<li><a href="tasks.html">📋 Tasks</a></li>
<li><a href="goals.html">🎯 Goals</a></li>
<li><a href="profile.html">👤 Profile</a></li>
<li><a href="settings.html">⚙ Settings</a></li>
</ul>

</div>

<div class="main">

<div class="header">
<h1>📊 Analytics Dashboard</h1>
</div>

<div class="cards">

<div class="card">
<h4>Total Study Hours</h4>
<div class="value">286h</div>
</div>

<div class="card">
<h4>Tasks Completed</h4>
<div class="value">128</div>
</div>

<div class="card">
<h4>Current Streak</h4>
<div class="value">14 🔥</div>
</div>

<div class="card">
<h4>XP Points</h4>
<div class="value">7420</div>
</div>

</div>

<div class="chart-container">
<div class="chart-title">Weekly Study Hours</div>
<canvas id="studyChart"></canvas>
</div>

<div class="chart-container">
<div class="chart-title">Skill Progress</div>
<canvas id="skillChart"></canvas>
</div>

<div class="chart-container">
<div class="chart-title">Goal Completion Rate</div>
<canvas id="goalChart"></canvas>
</div>

</div>

<script>

new Chart(document.getElementById('studyChart'),{
type:'line',
data:{
labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
datasets:[{
label:'Hours Studied',
data:[2,4,3,5,6,7,4],
borderColor:'#38bdf8',
backgroundColor:'rgba(56,189,248,0.2)',
fill:true,
tension:.4
}]
}
});

new Chart(document.getElementById('skillChart'),{
type:'bar',
data:{
labels:['Java','Python','DSA','SQL','ML'],
datasets:[{
label:'Progress %',
data:[85,75,65,70,50],
backgroundColor:[
'#38bdf8',
'#22c55e',
'#f59e0b',
'#ef4444',
'#8b5cf6'
]
}]
}
});

new Chart(document.getElementById('goalChart'),{
type:'doughnut',
data:{
labels:['Completed','Remaining'],
datasets:[{
data:[78,22],
backgroundColor:[
'#22c55e',
'#334155'
]
}]
}
});

</script>
<script src="script.js"></script>
</body>
</html>
